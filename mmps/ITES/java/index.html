# index.html

```html
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Directory Listing</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #eee;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      margin: 8px 0;
    }

    a {
      color: #4ea3ff;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>Files in Directory</h1>
  <ul id="file-list"></ul>

  <script>
    async function loadFiles() {
      const list = document.getElementById('file-list');

      try {
        const response = await fetch('./');
        const text = await response.text();

        const parser = new DOMParser();
        const doc = parser.parseFromString(text, 'text/html');

        const links = [...doc.querySelectorAll('a')]
          .map(a => a.getAttribute('href'))
          .filter(href => href && href !== '../');

        list.innerHTML = '';

        links.forEach(file => {
          const li = document.createElement('li');
          const a = document.createElement('a');

          a.href = file;
          a.textContent = file;

          li.appendChild(a);
          list.appendChild(li);
        });
      } catch (err) {
        list.innerHTML = '<li>Unable to load directory listing.</li>';
        console.error(err);
      }
    }

    loadFiles();
  </script>
</body>
</html>
```

This works only if your web server allows directory listing (Apache/Nginx autoindex enabled). Place this file inside the directory you want to display.
